name: AquaVolt-AI Hourly Sync + CI

on:
  schedule:
    # Run strictly hourly at the top of the hour
    - cron: '0 * * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Allow API failover trigger from Cron-Job.org
  repository_dispatch:
    types: [failover_trigger]
  # Run tests on every push and pull request
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Run Unit Tests (CI) ─────────────────────────────────────────────
  test:
    name: Run pytest Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest with coverage report
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=term-missing
        env:
          PYTHONIOENCODING: "utf-8"

  # ── Job 2: Hourly Data Sync (only on schedule / manual / dispatch) ──────────
  sync-data:
    name: Hourly Satellite Data Sync
    runs-on: ubuntu-latest
    # Only sync on schedule or manual dispatch — not on every push
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install production dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run hourly Google Sheets logger
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          AQUAVOLT_PREMIUM_API_KEY: ${{ secrets.AQUAVOLT_PREMIUM_API_KEY }}
          AQUAVOLT_SHEET_ID: ${{ secrets.AQUAVOLT_SHEET_ID }}
          GSHEET_NAME: "AquaVolt-AI Telemetry Log"
          AQUAVOLT_LAT: "38.5480"
          AQUAVOLT_LON: "-121.8780"
          AQUAVOLT_FARM: "UC Davis Russell Ranch"
          PYTHONIOENCODING: "utf-8"
        run: |
          python aquavolt_gsheet_logger.py

      - name: Generate live visualization plots
        env:
          PYTHONIOENCODING: "utf-8"
        run: |
          pip install matplotlib seaborn scipy
          python generate_plots.py

      - name: Commit and push live dashboard
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main
          git add README.md docs/*.png
          git commit -m "chore: Update live telemetry dashboard and plots [skip ci]" || echo "No changes to commit"
          git push
