name: AquaVolt-AI Hourly Sync

on:
  push:
    branches: [ main ]
  schedule:
    # Run every hour at the top of the hour
    - cron: '0 * * * *'
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread oauth2client

      - name: Run hourly Google Sheets logger
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          GSHEET_NAME: "AquaVolt-AI Telemetry Log"
          AQUAVOLT_LAT: "38.5414"
          AQUAVOLT_LON: "-121.8688"
          AQUAVOLT_FARM: "UC Davis Russell Ranch"
        run: |
          python aquavolt_gsheet_logger.py
