name: AquaVolt-AI Hourly Sync

on:
  schedule:
    # Run strictly hourly at the top of the hour
    - cron: '0 * * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Allow API failover trigger from Cron-Job.org
  repository_dispatch:
    types: [failover_trigger]

jobs:
  sync-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread oauth2client pystac-client planetary-computer rasterio certifi numpy

      - name: Run hourly Google Sheets logger
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          GSHEET_NAME: "AquaVolt-AI Telemetry Log"
          AQUAVOLT_LAT: "38.5480"
          AQUAVOLT_LON: "-121.8780"
          AQUAVOLT_FARM: "UC Davis Russell Ranch"
        run: |
          python aquavolt_gsheet_logger.py

      - name: Commit and push live dashboard
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "chore: Update live telemetry dashboard [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push
