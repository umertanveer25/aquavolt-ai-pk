name: AquaVolt-AI Hourly Sync

on:
  schedule:
    # Run every 20 minutes to ensure no hour is missed (de-duplicated by script)
    - cron: '*/20 * * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread oauth2client pystac-client planetary-computer rasterio certifi numpy

      - name: Run hourly Google Sheets logger
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          GSHEET_NAME: "AquaVolt-AI Telemetry Log"
          AQUAVOLT_LAT: "38.5414"
          AQUAVOLT_LON: "-121.8688"
          AQUAVOLT_FARM: "UC Davis Russell Ranch"
        run: |
          python aquavolt_gsheet_logger.py
