# ──────────────────────────────────────────────────────────────────────────────
# AquaVolt-AI — docker-compose.yml
# ──────────────────────────────────────────────────────────────────────────────
# One-command startup:
#   docker-compose up --build
#
# With live environment variables:
#   AQUAVOLT_PREMIUM_API_KEY=yourkey AQUAVOLT_SHEET_ID=yoursheetid docker-compose up
# ──────────────────────────────────────────────────────────────────────────────

version: '3.9'

services:

  # ── AquaVolt FastAPI REST Server ───────────────────────────────────────────
  api:
    build: .
    container_name: aquavolt_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Load from host environment or a .env file (never hardcode here)
      - AQUAVOLT_PREMIUM_API_KEY=${AQUAVOLT_PREMIUM_API_KEY}
      - AQUAVOLT_SHEET_ID=${AQUAVOLT_SHEET_ID}
      - PYTHONIOENCODING=utf-8
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8000/'); assert r.status_code==200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      # Mount plugins directory so new sensors can be dropped in without rebuilding
      - ./plugins:/app/plugins
      - ./ai_weights.json:/app/ai_weights.json
    labels:
      - "com.aquavolt.description=AquaVolt-AI REST API"
      - "com.aquavolt.version=2.1.0"

  # ── Nginx Reverse Proxy (optional, for production HTTPS) ──────────────────
  # Uncomment to expose with HTTPS via Let's Encrypt
  # nginx:
  #   image: nginx:alpine
  #   container_name: aquavolt_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - api
